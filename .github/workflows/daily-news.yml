name: Daily Tech News

on:
  schedule:
    # GitHub 使用 UTC 时间。北京时间 06:30 = UTC 22:30 (前一天)
    - cron: '30 22 * * *'
  workflow_dispatch:   # 允许在 Actions 页面手动触发, 方便测试

# contents: 写回 history.json; pages/id-token: 通过 GitHub Actions 部署语音到 Pages
permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily tech news push
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
          HOURS_BACK: '48'
          HISTORY_DAYS: '7'
          ENABLE_TTS: 'true'
        run: python push_news.py

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Stage site (audio)
        run: |
          mkdir -p site
          cp -r audio site/ || true
          touch site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Commit sent history
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git add history.json
          git commit -m "chore: update sent history [skip ci]" || echo "no history changes"
          git push
