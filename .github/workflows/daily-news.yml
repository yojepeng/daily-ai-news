name: Daily AI News

on:
  schedule:
    # GitHub 使用 UTC 时间。北京时间 08:00 = UTC 00:00
    - cron: '0 0 * * *'
  workflow_dispatch:   # 允许在 Actions 页面手动触发, 方便测试

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily AI news push
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
          MAX_ITEMS: '15'
          HOURS_BACK: '48'
        run: python push_news.py
