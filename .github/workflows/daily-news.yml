name: Daily Tech News

on:
  schedule:
    # GitHub 使用 UTC 时间。北京时间 06:30 = UTC 22:30 (前一天)
    - cron: '30 22 * * *'
  workflow_dispatch:   # 允许在 Actions 页面手动触发, 方便测试

# 需要写回 history.json (跨天去重用的历史记录)
permissions:
  contents: write

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily tech news push
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
          HOURS_BACK: '48'
          HISTORY_DAYS: '3'
        run: python push_news.py

      - name: Commit sent history
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git add history.json
          git commit -m "chore: update sent history [skip ci]" || echo "no history changes"
          git push
