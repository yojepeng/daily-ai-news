name: Daily Tech News

on:
  schedule:
    # GitHub 使用 UTC 时间。北京时间 06:30 = UTC 22:30 (前一天)
    - cron: '30 22 * * *'
  workflow_dispatch:   # 允许在 Actions 页面手动触发, 方便测试

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily tech news push
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
          ITEMS_PER_TOPIC: '8'
          HOURS_BACK: '48'
        run: python push_news.py
