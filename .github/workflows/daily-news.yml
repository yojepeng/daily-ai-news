name: Daily Tech News

on:
  schedule:
    # GitHub 使用 UTC 时间。北京时间 06:30 = UTC 22:30 (前一天)
    - cron: '30 22 * * *'
  workflow_dispatch:   # 允许在 Actions 页面手动触发, 方便测试

# contents: 写回 history.json / 音频文件到仓库（Pages 从分支自动发布）
permissions:
  contents: write

concurrency:
  group: daily-news-push
  cancel-in-progress: false

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily tech news push
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
          HOURS_BACK: '48'
          HISTORY_DAYS: '7'
          ENABLE_TTS: 'false'
        run: python push_news.py

      - name: Failure alert
        if: failure()
        env:
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
        run: |
          NOW_BJ=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M')
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -o /dev/null -w "%{http_code}" \
            "https://sctapi.ftqq.com/${SERVERCHAN_SENDKEY}.send" \
            --data-urlencode "title=⚠️ 每日科技推送失败 ${NOW_BJ}" \
            --data-urlencode "desp=运行记录: [查看日志](${RUN_URL})\n\n时间: ${NOW_BJ}（北京时间）\n请检查 Actions 日志定位原因。" \
            || true

      - name: Commit sent history
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git add history.json || true
          git commit -m "chore: update sent history [skip ci]" || echo "no changes"
          git push
